<!DOCTYPE html>
<html lang="ko" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Active ETF Analysis{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">Active ETF Analysis</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">대시보드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'signals' %}active{% endif %}" href="/signals">시그널</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'chart' %}active{% endif %}" href="/chart">차트</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'daily' %}active{% endif %}" href="/daily">날짜별</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <span id="lastUpdate" class="text-muted small"></span>
                    <button id="btnCollect" class="btn btn-sm btn-outline-primary" onclick="startCollect()">
                        수동 수집
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()" title="테마 전환">
                        <span id="themeIcon">🌙</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        {% block content %}{% endblock %}
    </div>

    <footer class="border-top py-2 text-center text-muted small">
        <span id="footerInfo">Active ETF Analysis</span>
        <span id="collectStatus" class="ms-2"></span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 테마 토글
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-bs-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', next);
            localStorage.setItem('etf_theme', next);
            document.getElementById('themeIcon').textContent = next === 'dark' ? '☀️' : '🌙';
        }

        // 테마 복원
        (function() {
            const saved = localStorage.getItem('etf_theme');
            if (saved) {
                document.documentElement.setAttribute('data-bs-theme', saved);
                document.getElementById('themeIcon').textContent = saved === 'dark' ? '☀️' : '🌙';
            }
        })();

        // 마지막 업데이트 정보
        fetch('/api/last-update')
            .then(r => r.json())
            .then(data => {
                if (data.last_date) {
                    document.getElementById('lastUpdate').textContent =
                        `최신: ${data.last_date} | ETF ${data.etf_count}개 | 종목 ${data.stock_count}개`;
                } else {
                    document.getElementById('lastUpdate').textContent = '데이터 없음';
                }
            })
            .catch(() => {
                document.getElementById('lastUpdate').textContent = '';
            });

        // 수동 수집
        function startCollect() {
            const btn = document.getElementById('btnCollect');
            const status = document.getElementById('collectStatus');
            btn.disabled = true;
            btn.textContent = '수집 중...';
            status.textContent = '';

            fetch('/api/collect', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    btn.disabled = false;
                    btn.textContent = '수동 수집';
                    if (data.status === 'started') {
                        status.textContent = '수집이 시작되었습니다.';
                        status.className = 'ms-2 text-success small';
                        pollCollectStatus();
                    } else if (data.status === 'already_running') {
                        status.textContent = '이미 수집 중입니다.';
                        status.className = 'ms-2 text-warning small';
                    }
                })
                .catch(() => {
                    btn.disabled = false;
                    btn.textContent = '수동 수집';
                    status.textContent = '수집 요청 실패';
                    status.className = 'ms-2 text-danger small';
                });
        }

        function pollCollectStatus() {
            const status = document.getElementById('collectStatus');
            const interval = setInterval(() => {
                fetch('/api/collect-status')
                    .then(r => r.json())
                    .then(data => {
                        if (data.running) {
                            status.textContent = `수집 중... (${data.progress || ''})`;
                        } else {
                            clearInterval(interval);
                            status.textContent = '수집 완료! 페이지를 새로고침하세요.';
                            status.className = 'ms-2 text-success small';
                        }
                    });
            }, 3000);
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
